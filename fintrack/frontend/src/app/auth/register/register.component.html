<div class="auth-container">
  <div class="auth-card card">
    <h2>Create your account</h2>
    <p class="subtitle">Start tracking your finances today</p>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" formControlName="fullName" placeholder="Enter full name">
      </div>

      <div class="form-group">
        <label>Username</label>
        <input type="text" formControlName="username" placeholder="Choose a username">
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" formControlName="email" placeholder="Enter email">
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" formControlName="password" placeholder="Minimum 6 characters">
      </div>

      <div class="error-text" *ngIf="errorMessage">{{ errorMessage }}</div>

      <button type="submit" class="btn btn-primary full-width" [disabled]="registerForm.invalid || isLoading">
        {{ isLoading ? 'Creating account...' : 'Register' }}
      </button>
    </form>

    <p class="switch-link">Already have an account? <a routerLink="/login">Login here</a></p>
  </div>
</div>
