<div class="auth-container">
  <div class="auth-card card">
    <h2>💰 FinTrack Login</h2>
    <p class="subtitle">Track your income & expenses smartly</p>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Username</label>
        <input type="text" formControlName="username" placeholder="Enter username">
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" formControlName="password" placeholder="Enter password">
      </div>

      <div class="error-text" *ngIf="errorMessage">{{ errorMessage }}</div>

      <button type="submit" class="btn btn-primary full-width" [disabled]="loginForm.invalid || isLoading">
        {{ isLoading ? 'Logging in...' : 'Login' }}
      </button>
    </form>

    <p class="switch-link">Don't have an account? <a routerLink="/register">Register here</a></p>
  </div>
</div>
