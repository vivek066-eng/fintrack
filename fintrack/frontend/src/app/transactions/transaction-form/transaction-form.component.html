<form [formGroup]="form" (ngSubmit)="onSubmit()" class="txn-form">
  <div class="form-row">
    <div class="form-group">
      <label>Title</label>
      <input type="text" formControlName="title" placeholder="e.g. Grocery shopping">
    </div>

    <div class="form-group">
      <label>Amount (₹)</label>
      <input type="number" formControlName="amount" placeholder="0.00" step="0.01">
    </div>
  </div>

  <div class="form-row">
    <div class="form-group">
      <label>Type</label>
      <select formControlName="type">
        <option value="EXPENSE">Expense</option>
        <option value="INCOME">Income</option>
      </select>
    </div>

    <div class="form-group">
      <label>Category</label>
      <select formControlName="category">
        <option value="" disabled>Select category</option>
        <option *ngFor="let c of categories" [value]="c">{{ c }}</option>
      </select>
    </div>
  </div>

  <div class="form-row">
    <div class="form-group">
      <label>Date</label>
      <input type="date" formControlName="date">
    </div>
  </div>

  <div class="form-group">
    <label>Notes (optional)</label>
    <input type="text" formControlName="notes" placeholder="Add a note">
  </div>

  <div class="error-text" *ngIf="errorMessage">{{ errorMessage }}</div>

  <div class="form-actions">
    <button type="submit" class="btn btn-primary" [disabled]="form.invalid">
      {{ editingTransaction ? 'Update' : 'Add' }} Transaction
    </button>
    <button type="button" class="btn btn-secondary" (click)="onCancel()" *ngIf="editingTransaction">Cancel</button>
  </div>
</form>
