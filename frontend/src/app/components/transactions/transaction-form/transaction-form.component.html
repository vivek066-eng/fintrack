<div class="dashboard-page">
  <div class="dashboard-card">
    <h1>{{ isEditMode ? 'Edit transaction' : 'Add transaction' }}</h1>

    <div class="alert-error" *ngIf="errorMessage">{{ errorMessage }}</div>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-group">
        <label for="title">Title</label>
        <input id="title" type="text" formControlName="title" placeholder="e.g. Grocery shopping" />
        <div class="field-error" *ngIf="form.get('title')?.touched && form.get('title')?.invalid">
          Title is required.
        </div>
      </div>

      <div class="form-group">
        <label for="type">Type</label>
        <select id="type" formControlName="type" style="width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px;">
          <option value="EXPENSE">Expense</option>
          <option value="INCOME">Income</option>
        </select>
      </div>

      <div class="form-group">
        <label for="amount">Amount</label>
        <input id="amount" type="number" step="0.01" formControlName="amount" placeholder="0.00" />
        <div class="field-error" *ngIf="form.get('amount')?.touched && form.get('amount')?.invalid">
          Enter a valid positive amount.
        </div>
      </div>

      <div class="form-group">
        <label for="category">Category</label>
        <select id="category" formControlName="category" style="width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px;">
          <option value="" disabled>Select a category</option>
          <option *ngFor="let c of categories" [value]="c">{{ c }}</option>
        </select>
        <div class="field-error" *ngIf="form.get('category')?.touched && form.get('category')?.invalid">
          Category is required.
        </div>
      </div>

      <div class="form-group">
        <label for="date">Date</label>
        <input id="date" type="date" formControlName="date" />
        <div class="field-error" *ngIf="form.get('date')?.touched && form.get('date')?.invalid">
          Date is required.
        </div>
      </div>

      <div class="form-group">
        <label for="notes">Notes (optional)</label>
        <input id="notes" type="text" formControlName="notes" placeholder="Any extra detail" />
      </div>

      <button class="btn-primary" type="submit" [disabled]="loading">
        {{ loading ? 'Saving...' : (isEditMode ? 'Save changes' : 'Add transaction') }}
      </button>
    </form>

    <div class="auth-switch">
      <a routerLink="/transactions">← Back to transactions</a>
    </div>
  </div>
</div>
