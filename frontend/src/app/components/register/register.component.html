<div class="auth-page">
  <div class="auth-card">
    <h1>Create your account</h1>
    <p class="subtitle">Start tracking your finances with Fintrack</p>

    <div class="alert-error" *ngIf="errorMessage">{{ errorMessage }}</div>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-group">
        <label for="username">Username</label>
        <input id="username" type="text" formControlName="username" autocomplete="username" />
        <div class="field-error" *ngIf="form.get('username')?.touched && form.get('username')?.errors?.['required']">
          Username is required.
        </div>
        <div class="field-error" *ngIf="form.get('username')?.touched && (form.get('username')?.errors?.['minlength'] || form.get('username')?.errors?.['maxlength'])">
          Username must be between 3 and 50 characters.
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" formControlName="email" autocomplete="email" />
        <div class="field-error" *ngIf="form.get('email')?.touched && form.get('email')?.errors?.['required']">
          Email is required.
        </div>
        <div class="field-error" *ngIf="form.get('email')?.touched && form.get('email')?.errors?.['email']">
          Enter a valid email address.
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" formControlName="password" autocomplete="new-password" />
        <div class="field-error" *ngIf="form.get('password')?.touched && form.get('password')?.errors?.['required']">
          Password is required.
        </div>
        <div class="field-error" *ngIf="form.get('password')?.touched && form.get('password')?.errors?.['minlength']">
          Password must be at least 6 characters.
        </div>
      </div>

      <div class="form-group">
        <label for="fullName">Full name (optional)</label>
        <input id="fullName" type="text" formControlName="fullName" autocomplete="name" />
      </div>

      <button class="btn-primary" type="submit" [disabled]="loading">
        {{ loading ? 'Creating account...' : 'Register' }}
      </button>
    </form>

    <div class="auth-switch">
      Already have an account? <a routerLink="/login">Log in</a>
    </div>
  </div>
</div>
