<div class="auth-page">
  <div class="auth-card">
    <h1>Welcome back</h1>
    <p class="subtitle">Log in to your Fintrack account</p>

    <div class="alert-error" *ngIf="errorMessage">{{ errorMessage }}</div>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-group">
        <label for="username">Username</label>
        <input id="username" type="text" formControlName="username" autocomplete="username" />
        <div class="field-error" *ngIf="form.get('username')?.touched && form.get('username')?.invalid">
          Username is required.
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" formControlName="password" autocomplete="current-password" />
        <div class="field-error" *ngIf="form.get('password')?.touched && form.get('password')?.invalid">
          Password is required.
        </div>
      </div>

      <button class="btn-primary" type="submit" [disabled]="loading">
        {{ loading ? 'Logging in...' : 'Log in' }}
      </button>
    </form>

    <div class="auth-switch">
      Don't have an account? <a routerLink="/register">Register</a>
    </div>
  </div>
</div>
